<!-- 密码短代码 -->
{{ $password := .Get 0 }}
{{ $content := .Inner | .Page.RenderString }}
<div id="protected-content-{{ .Ordinal }}" class="protected-content">
    <div class="password-form" id="form-{{ .Ordinal }}">
        <p>这篇文章需要密码才能查看：</p>
        <input type="password" id="password-{{ .Ordinal }}" placeholder="请输入密码" />
        <button onclick="checkPassword({{ .Ordinal }}, '{{ $password }}')">提交</button>
        <p id="error-{{ .Ordinal }}" style="color: red; display: none;">密码错误，请重试</p>
    </div>
    <div id="content-{{ .Ordinal }}" style="display: none;">
        {{ $content }}
    </div>
</div>

<script>
    function checkPassword(index, correctPassword) {
        var inputPwd = document.getElementById('password-' + index).value;
        if (inputPwd === correctPassword) {
            document.getElementById('form-' + index).style.display = 'none';
            document.getElementById('content-' + index).style.display = 'block';
        } else {
            document.getElementById('error-' + index).style.display = 'block';
        }
    }
</script>

<style>
    .password-form input {
        padding: 8px;
        margin-right: 10px;
        border: 1px solid #ccc;
        border-radius: 3px;
    }

    .password-form button {
        padding: 8px 15px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 3px;
        cursor: pointer;
    }
</style>
